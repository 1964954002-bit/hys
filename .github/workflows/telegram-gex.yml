name: Telegram GEX push

on:
  schedule:
    # Every 4 hours (UTC). GitHub may start a few minutes late.
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Telegram secrets are configured
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "::error::Missing secret TELEGRAM_BOT_TOKEN (Settings → Secrets → Actions)"
            exit 1
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::error::Missing secret TELEGRAM_CHAT_ID (numeric chat id from getUpdates)"
            exit 1
          fi

      - name: Fetch data, render heatmap, send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MPLBACKEND: Agg
          MPLCONFIGDIR: ${{ github.workspace }}/.matplotlib
        run: |
          set -e
          python scripts/push_telegram.py
          echo "All steps finished OK."
